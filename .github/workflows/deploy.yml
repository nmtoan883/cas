name: Deploy CAS to VPS

on:
  push:
    branches:
      - main
      - master # Tự động chạy khi có code mới đẩy lên nhánh main hoặc master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build --no-daemon

      - name: Upload WAR to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          source: "build/libs/cas.war"
          target: "/www/wwwroot/sso.nmt.io.vn"
          strip_components: 2 # Xóa thư mục build/libs trên đường dẫn VPS, chỉ giữ lại file cas.war

      - name: Restart CAS Service on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /www/wwwroot/sso.nmt.io.vn
            echo "Killing old CAS process..."
            if [ -f cas.pid ]; then kill -9 $(cat cas.pid) || true; rm cas.pid; fi
            fuser -k 9090/tcp || true
            sleep 2
            echo "Starting new CAS process..."
            nohup java -jar cas.war > cas.log 2>&1 &
            echo $! > cas.pid
            echo "Deploy successful!"
